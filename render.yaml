services:
  # 1. BACKEND: Web Service
  - type: web
    name: clinic-desk-api
    env: node
    plan: free
    region: singapore
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://clinic-desk.onrender.com # Update this after frontend is deployed

  # 2. FRONTEND: Static Site (Free on Render)
  - type: static
    name: clinic-desk-frontend
    env: static
    plan: free
    region: singapore
    buildCommand: cd client && npm install && npm run build
    publishPath: client/dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-store, no-cache, must-revalidate, proxy-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://clinic-desk-api.onrender.com/api # Update this after backend is deployed
      - key: VITE_RAZORPAY_KEY_ID
        sync: false

