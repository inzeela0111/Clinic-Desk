services:
  # Clinic-Desk Unified Full Stack Service
  - type: web
    name: clinic-desk
    env: node
    plan: free
    region: singapore
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://clinic-desk.onrender.com # Update this if your URL is different
      - key: VITE_API_BASE_URL
        value: /api # Points to the same server
      - key: VITE_RAZORPAY_KEY_ID
        value: rzp_test_SlbzL4qE5d6saw # Provided as a fallback, but should be set in dashboard
